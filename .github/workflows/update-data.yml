name: Update Labor Market Data

on:
  # Run twice monthly to catch staggered BLS releases:
  # - 7th: Employment Situation data (released first Friday of month)
  # - 14th: JOLTS data (released ~10th-12th of month)
  schedule:
    - cron: '0 10 7 * *'
    - cron: '0 10 14 * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run update script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_data.py

      # Slices/occupations only build once a committed source-verification
      # report exists (data/source-verification.json); they no-op otherwise.
      - name: Build slice data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_slices.py

      - name: Build occupation data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_occupations.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          if [ -d data ]; then git add data; fi
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update data.json with latest BLS data"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push || (git pull --rebase origin "${GITHUB_REF_NAME}" && git push)
          fi
